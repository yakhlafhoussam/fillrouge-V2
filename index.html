<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Fil Noir 2026 · GryffindorElites · Points & Gallery</title>
  <!-- Tailwind + Inter refined -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="orb-elegant left"></div>
  <div class="orb-elegant right"></div>

  <div class="progress-circle-container">
    <svg class="progress-circle" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3b82f6" />
          <stop offset="100%" stop-color="#8bbaff" />
        </linearGradient>
      </defs>
      <circle class="progress-circle-bg" cx="50" cy="50" r="45" />
      <circle class="progress-circle-fill" id="progressFill" cx="50" cy="50" r="45" stroke-dasharray="0, 282.74" />
    </svg>
    <div class="progress-text">
      <span id="progressPercentage">0</span><span>%</span>
      <div class="progress-label">SEASON</div>
    </div>
  </div>

  <div class="relative z-40 w-full max-w-5xl p-5 appear-smooth">
    <div class="card-refined p-9 md:p-13 lg:p-14">

      <div class="flex flex-wrap items-center justify-between gap-5 mb-10">
        <span id="classBadge"
          class="text-xs font-medium text-blue-400/70 tracking-[0.3em] bg-[#101b2b] px-6 py-3 rounded-full border border-blue-900/50 uppercase">
          <span class="inline-block loader-mini w-4 h-4 border-2 mr-2 align-middle"></span> Loading GryffindorElites...
        </span>
        <div class="flex items-center gap-5">
          <span class="text-sm text-blue-400/40">Crafted by</span>
          <span class="hyk-sleek">HYK</span>
        </div>
      </div>

      <div id="mainUI">
        <div class="text-center">
          <h1 class="text-5xl md:text-7xl font-bold text-white tracking-tight">Fil Noir <span class="text-blue-400 font-light">2026</span></h1>
          <p class="text-gray-400 mt-3 text-base md:text-lg">The dark day · May 5</p>
        </div>

        <div class="flex justify-center my-10">
          <div class="learners-premium" id="learnerContainer">
            <div class="student-images-container" id="studentImagesContainer"></div>
            <div class="text-center">
              <span class="learners-text-glow" id="learnerMessage">— gathering wizards —</span>
              <div id="pointsDisplay" class="points-badge mt-2"><span>⭐</span> <span id="pointsValue">--</span> pts</div>
              <div id="roleDisplay" class="role-tag mt-1 text-[10px] uppercase tracking-wider">Learner</div>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-7 mt-8">
          <div class="tile-premium"><span class="digit-clean" id="days">00</span><span class="digit-label">DAYS</span></div>
          <div class="tile-premium"><span class="digit-clean" id="hours">00</span><span class="digit-label">HOURS</span></div>
          <div class="tile-premium"><span class="digit-clean" id="minutes">00</span><span class="digit-label">MINUTES</span></div>
          <div class="tile-premium"><span class="digit-clean" id="seconds">00</span><span class="digit-label">SECONDS</span></div>
        </div>
      </div>

      <div id="finalUI" class="hidden w-full flex justify-center py-6"></div>

      <div class="footer-sleek mt-14 pt-8 text-center text-sm text-gray-500 flex flex-wrap items-center justify-center gap-5">
        <span>✦</span>
        <span>Fil Noir · YouCode</span>
        <span>✦</span>
        <span id="classFooterSpan" class="text-blue-400/80">GryffindorElites</span>
        <span>✦</span>
        <span id="memberCountSpan" class="text-gray-400 text-xs">0 members</span>
      </div>
    </div>
  </div>

<script src="script.js"></script>
</body>

</html>
